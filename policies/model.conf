[request_definition]
# sub : sujet (au moins { role: string, id?: string })
# obj : ressource (string)
# act : action (string)
# attrs : attributs dynamiques (map), p.ex. { ownerId, status }
r = sub, obj, act, attrs

[policy_definition]
# p.sub : rôle ou rôle parent (string)
# p.obj : ressource (string)
# p.act : action (string)
# p.eft : effet ("allow" ou "deny")
# p.cond : condition ABAC (booléen via eval)
p = sub, obj, act, eft, cond

[role_definition]
# héritage de rôles si besoin (groupe de rôles)
# g[parent, child]
g = _, _

[policy_effect]
# autoriser si au moins une politique p match et p.eft == allow
e = some(where (p.eft == allow))

[matchers]
# matcher principal : 
# - le rôle match p.sub (ou hérité via g)  
# - la ressource et l’action matchent  
# - la condition p.cond est vraie
m = (
    (g(r.sub.role, p.sub) || r.sub.role == p.sub)
    && r.obj == p.obj
    && r.act == p.act
    && eval(p.cond)
)

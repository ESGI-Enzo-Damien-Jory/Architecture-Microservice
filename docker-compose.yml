services:
  client-service:
    build: ./client-service
    ports:
      - "8080:3333"
    environment:
      - TZ=${CLIENT_SERVICE_TZ}
      - PORT=${CLIENT_SERVICE_PORT}
      - HOST=${CLIENT_SERVICE_HOST}
      - LOG_LEVEL=${CLIENT_SERVICE_LOG_LEVEL}
      - APP_KEY=${CLIENT_SERVICE_APP_KEY}
      - NODE_ENV=${CLIENT_SERVICE_NODE_ENV}
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: []

  delivery-service:
    build: ./delivery-service
    ports:
      - "8083:3333"
    environment:
      - TZ=${DELIVERY_SERVICE_TZ}
      - PORT=${DELIVERY_SERVICE_PORT}
      - HOST=${DELIVERY_SERVICE_HOST}
      - LOG_LEVEL=${DELIVERY_SERVICE_LOG_LEVEL}
      - APP_KEY=${DELIVERY_SERVICE_APP_KEY}
      - NODE_ENV=${DELIVERY_SERVICE_NODE_ENV}
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: []



services:
  service-clients:
    build: ./client-service
    ports:
      - "8080:3333"
    environment:
      - TZ=${SERVICE_CLIENT_TZ}
      - PORT=${SERVICE_CLIENT_PORT}
      - HOST=${SERVICE_CLIENT_HOST}
      - LOG_LEVEL=${SERVICE_CLIENT_LOG_LEVEL}
      - APP_KEY=${SERVICE_CLIENT_APP_KEY}
      - NODE_ENV=${SERVICE_CLIENT_NODE_ENV}
      - DB_URL=${DB_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: []


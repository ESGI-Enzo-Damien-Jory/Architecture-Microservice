services:
  rabbitmq:
    image: rabbitmq:3.13.1-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: supersecret
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres_auth:
    image: postgres:16
    container_name: postgres_auth
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
      - ./auth/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "auth_user", "-d", "auth"]
      interval: 5s
      timeout: 2s
      retries: 5


  postgres_command:
    image: postgres:16
    container_name: postgres_command
    environment:
      POSTGRES_DB: command
      POSTGRES_USER: command_user
      POSTGRES_PASSWORD: command_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_command_data:/var/lib/postgresql/data

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    environment:
      PRIVATE_KEY_PATH: /secrets/private.pem
      PUBLIC_KEY_PATH: /secrets/public.pem
      DATABASE_URL: postgresql://auth_user:auth_pass@postgres_auth:5432/auth?sslmode=disable
      AUTH_PORT: "5000"
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      - postgres_auth
    ports:
      - "5001:5000"

  command:
    build:
      context: ./command
      dockerfile: Dockerfile
    environment:
      PUBLIC_KEY_PATH: /secrets/public.pem
      DATABASE_URL: postgresql://command_user:command_pass@postgres_command:5432/command?sslmode=disable
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      - postgres_command
      - rabbitmq
    ports:
      - "5002:5000"

volumes:
  rabbitmq_data:
  pg_auth_data:
  pg_command_data:

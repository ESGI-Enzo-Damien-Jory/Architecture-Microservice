services:
  rabbitmq:
    image: rabbitmq:3.13.1-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: supersecret
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_command:
    image: postgres:16
    container_name: postgres_command
    environment:
      POSTGRES_DB: command
      POSTGRES_USER: command_user
      POSTGRES_PASSWORD: command_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "command_user", "-d", "command"]
      interval: 5s
      timeout: 2s
      retries: 5

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@postgres_auth:5432/auth?sslmode=disable
      PORT: "5000"
      JWT_SECRET: your-super-secret-jwt-key-change-me-in-production
    ports:
      - "5001:5000"
    restart: unless-stopped

  command:
    build:
      context: ./command
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://command_user:command_pass@postgres_command:5432/command?sslmode=disable
      PORT: "5000"
      RABBITMQ_URL: amqp://admin:supersecret@rabbitmq:5672
    depends_on:
      postgres_command:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5002:5000"
    restart: unless-stopped

  web:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_URL: http://localhost:5001
      NEXT_PUBLIC_COMMAND_URL: http://localhost:5002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth
      - command
    restart: unless-stopped

volumes:
  rabbitmq_data:
  pg_command_data:
